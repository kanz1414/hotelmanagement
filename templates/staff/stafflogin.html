{% extends 'basic.html' %}
{% block title %}staff{% endblock title %}

{% block body %}

<div class="container py-5">

    <div class="card w-50 mx-auto shadow">

        <!-- Tabs -->
        <div class="card-header bg-light">
            <ul class="nav nav-tabs justify-content-center">

                <li class="nav-item">
                    <a class="nav-link active" data-bs-toggle="tab" href="#login">Login</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" data-bs-toggle="tab" href="#signup">Signup</a>
                </li>

            </ul>
        </div>

        <div class="card-body">

            <!-- Messages -->
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-info text-center">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <div class="tab-content">

                <!-- LOGIN -->
                <div id="login" class="tab-pane fade show active">

                    <p class="text-center">Staff Login</p>

                    <form action="{% url 'staff_login' %}" method="POST">
                        {% csrf_token %}

                        <input type="text" class="form-control mb-2" name="username" placeholder="Username" required>

                        <input type="password" class="form-control mb-2" name="password" placeholder="Password" required>

                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>

                </div>

                <!-- SIGNUP -->
                <div id="signup" class="tab-pane fade">

                    <p class="text-center">Staff Signup</p>

                    <form action="{% url 'staff_signup' %}" method="POST">
                        {% csrf_token %}

                        <input type="text" class="form-control mb-2" name="username" placeholder="Username" required>

                        <input type="password" class="form-control mb-2" name="password1" placeholder="Password" required>

                        <input type="password" class="form-control mb-3" name="password2" placeholder="Confirm Password" required>

                        <button type="submit" class="btn btn-success w-100">Sign Up</button>
                    </form>

                </div>

            </div>

        </div>
    </div>

</div>

{% endblock body %}
