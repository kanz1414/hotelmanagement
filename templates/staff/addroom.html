{% extends 'basic.html' %}

{% block title %}Add Room{% endblock title %}

{% block body %}

<div class="container">

    <!-- Title -->
    <div class="text-center mb-4">
        <h2 class="fw-bold">Add New Room</h2>
        <p class="text-muted">Enter room details below</p>
    </div>

    <!-- Form Card -->
    <div class="row justify-content-center">
        <div class="col-lg-6">

            <div class="card shadow-lg border-0">
                <div class="card-body p-4">

                    <form action="{% url 'addroom' %}" method="POST" enctype="multipart/form-data">
                        {% csrf_token %}

                        <!-- Room Type -->
                        <div class="mb-3">
                            <label class="form-label">Room Type</label>
                            <select class="form-select" name="roomtype" required>
                                <option value="">Select Type</option>
                                <option value="1">Premium</option>
                                <option value="2">Deluxe</option>
                                <option value="3">Basic</option>
                            </select>
                        </div>

                        <!-- Capacity -->
                        <div class="mb-3">
                            <label class="form-label">Capacity</label>
                            <input type="number" class="form-control" name="capacity" placeholder="Enter capacity" required>
                        </div>

                        <!-- Price -->
                        <div class="mb-3">
                            <label class="form-label">Price</label>
                            <input type="number" class="form-control" name="price" placeholder="Enter price" required>
                        </div>

                        <!-- Size -->
                        <div class="mb-3">
                            <label class="form-label">Room Size (sq ft)</label>
                            <input type="number" class="form-control" name="size" placeholder="Enter size" required>
                        </div>

                        <!-- Status -->
                        <div class="mb-3">
                            <label class="form-label">Status</label>
                            <select class="form-select" name="status" required>
                                <option value="1">Available</option>
                                <option value="2">Not Available</option>
                            </select>
                        </div>

                        <!-- Location -->
                        <div class="mb-3">
                            <label class="form-label">Location</label>
                            <select class="form-select" name="hotel" required>
                                {% for each_location, eachid in location %}
                                <option value="{{ eachid }}">{{ each_location }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <!-- ✅ Image Upload -->
                        <div class="mb-3">
                            <label class="form-label">Room Image</label>
                            <input type="file" class="form-control" name="image" accept="image/*" required>
                        </div>

                        <!-- Submit -->
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-plus"></i> Add Room
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

{% endblock body %}
