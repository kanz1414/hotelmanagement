{% extends 'basic.html' %}
{% block title %}Book Room{% endblock title %}

{% block body %}
{% load app_tags %}

<style>
    body {
        background: #f5f7fa;
    }

    .hero {
        background: url('https://images.unsplash.com/photo-1566073771259-6a8506099945') center/cover no-repeat;
        height: 250px;
        border-radius: 0 0 30px 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
        font-size: 32px;
        letter-spacing: 1px;
    }

    .booking-card {
        margin-top: -80px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        padding: 30px;
    }

    .section-title {
        font-weight: 600;
        color: #0d6efd;
        margin-bottom: 15px;
    }

    .form-control {
        border-radius: 10px;
    }

    .btn-book {
        background: linear-gradient(45deg, #0d6efd, #4facfe);
        border: none;
        border-radius: 30px;
        padding: 10px 30px;
        font-weight: 500;
        color: white;
    }

    .btn-book:hover {
        background: linear-gradient(45deg, #0b5ed7, #3a8bfd);
    }
</style>

<!-- Hero Section -->
<div class="hero">
    Book Your Stay 🏨
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-10">

            <div class="booking-card">

                <form action="{% url 'book_room' %}" method="POST">
                    {% csrf_token %}

                    <!-- Hotel Details -->
                    <h5 class="section-title">🏨 Hotel Details</h5>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Hotel Name</label>
                            <input type="text" class="form-control" value="{{room.hotel.name}}" disabled>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Location</label>
                            <input type="text" class="form-control" value="{{room.hotel.location}}" disabled>
                        </div>
                    </div>

                    <!-- User -->
                    <h5 class="section-title"> User Information</h5>

                    <div class="mb-3">
                        <label>Username</label>
                        <input type="text" class="form-control" name="username" value="{{request.user}}" readonly>
                    </div>

                    <!-- Booking -->
                    <h5 class="section-title">📅 Booking Details</h5>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label>Persons</label>
                            <input type="number" class="form-control" name="person"
                                   min="1" max="{{room.capacity}}" value="1" required>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label>Room Type</label>
                            <input type="text" class="form-control"
                                   value="{{room.get_room_type_display}}" disabled>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label>Price / Night</label>
                            <input type="text" class="form-control"
                                   value="₹{{room.price}}" disabled>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Check-In</label>
                            <input type="date" class="form-control"
                                   name="check_in"
                                   min="{% todays_date %}"
                                   max="{% max_date %}"
                                   required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Check-Out</label>
                            <input type="date" class="form-control"
                                   name="check_out"
                                   min="{% tommorow %}"
                                   max="{% max_date %}"
                                   required>
                        </div>
                    </div>

                    <input type="hidden" name="room_id" value="{{room.id}}">

                    <!-- Button -->
                    <div class="text-center mt-4">
                        <button type="submit" class="btn btn-book">
                            Confirm Booking 
                        </button>
                    </div>

                </form>

            </div>

        </div>
    </div>
</div>

{% endblock %}
