{% extends 'basic.html' %}
{% load static %}
{% block title %}Edit Room{% endblock title %}

{% block body %}
<div class="container py-5">

    <!-- Page Header -->
    <div class="text-center mb-4">
        <h2 class="fw-bold text-primary">Edit Room</h2>
        <p class="text-muted">Update the details of this room below</p>
    </div>

    <!-- Room Image Preview -->
    <div class="text-center mb-4">
        {% if room.image %}
            <img id="roomPreview" src="{{ room.image.url }}" class="img-fluid rounded" style="max-height: 300px; object-fit: cover;">
        {% else %}
            <img id="roomPreview" src="{% static 'images/hotel.avif' %}" class="img-fluid rounded" style="max-height: 300px; object-fit: cover;">
        {% endif %}
    </div>

    <!-- Edit Form -->
    <form action="/staff/edit-room" method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="row g-3">

            <!-- Room Number -->
            <div class="col-md-6">
                <label class="form-label">Room Number</label>
                <input type="number" class="form-control" value="{{ room.room_number }}" disabled>
            </div>

            <!-- Room Type -->
            <div class="col-md-6">
                <label class="form-label">Room Type</label>
                <select class="form-select form-control" name="roomtype">
                    {% for key, value in room_types %}
                    <option value="{{ key }}" {% if room.room_type == key %}selected{% endif %}>
                        {{ value }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <!-- Capacity -->
            <div class="col-md-6">
                <label class="form-label">Capacity</label>
                <input type="number" class="form-control" name="capacity" value="{{ room.capacity }}">
            </div>

            <!-- Price -->
            <div class="col-md-6">
                <label class="form-label">Price (₹)</label>
                <input type="number" class="form-control" name="price" value="{{ room.price }}">
            </div>

            <!-- Size -->
            <div class="col-md-6">
                <label class="form-label">Size (sq ft)</label>
                <input type="number" class="form-control" name="size" value="{{ room.size }}">
            </div>

            <!-- Status -->
            <div class="col-md-6">
                <label class="form-label">Status</label>
                <select class="form-select form-control" name="status">
                    {% for key, value in room_status %}
                    <option value="{{ key }}" {% if room.status == key %}selected{% endif %}>
                        {{ value }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <!-- Hotel Location -->
            <div class="col-12">
                <label class="form-label">Hotel Location</label>
                <input type="text" class="form-control" value="{{ room.hotel.location }}" disabled>
            </div>

            <!-- Image Upload -->
            <div class="col-12">
                <label class="form-label">Update Room Image</label>
                <input type="file" class="form-control" name="image" accept="image/*" onchange="previewImage(event)">
            </div>

            <!-- Buttons -->
            <div class="col-12 d-grid gap-2 mt-3">
                <button type="submit" class="btn btn-primary btn-lg">Save Changes</button>
                <a href="/staff/dashboard" class="btn btn-outline-secondary btn-lg">Cancel</a>
            </div>

        </div>

        <!-- Hidden Fields -->
        <input type="hidden" name="roomid" value="{{ room.id }}">
        <input type="hidden" name="hotel" value="{{ room.hotel.id }}">

    </form>

</div>

<!-- JS for Image Preview -->
<script>
function previewImage(event) {
    const output = document.getElementById('roomPreview');
    output.src = URL.createObjectURL(event.target.files[0]);
    output.onload = function() {
        URL.revokeObjectURL(output.src) // free memory
    }
}
</script>

{% endblock body %}
